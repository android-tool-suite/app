name: Component CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803

      - name: Set up JDK 17
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle 8.9
        uses: gradle/actions/setup-gradle@90ddb51e90a5fd9ba75f40cf85156b7b41bf76a3
        with:
          gradle-version: '8.9'

      - name: Test and build debug artifact
        shell: pwsh
        run: gradle clean :app:testDebugUnitTest collectArtifacts

      - name: Upload debug artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: android-tool-suite-${{ github.sha }}
          path: artifacts/android-tool-suite-debug.apk
          if-no-files-found: error
