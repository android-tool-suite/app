plugins {
    id "com.android.application"
}

android {
    namespace "com.example.shizukuaccessibilitygrant.plugin.phigros"
    compileSdk 35

    defaultConfig {
        applicationId "com.example.shizukuaccessibilitygrant.plugin.phigros"
        minSdk 24
        targetSdk 35
        versionCode 2
        versionName "1.1.0"
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    compileOnly project(":plugin-sdk")
}

tasks.register("packagePlugin", Zip) {
    dependsOn "assembleDebug"
    archiveFileName = "phigros-advisor.atsplugin"
    destinationDirectory = layout.buildDirectory.dir("outputs/atsplugin")
    from("manifest.json")
    from(layout.buildDirectory.file("outputs/apk/debug/phigros-advisor-debug.apk")) {
        rename { "plugin.apk" }
    }
}
